<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Balaji Classes — Enquire</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0a0a0c;
      --bg-card: rgba(22, 22, 28, 0.65);
      --border: rgba(212, 175, 55, 0.22);
      --gold: #d4af37;
      --gold-hover: #e8c547;
      --gold-muted: rgba(212, 175, 55, 0.35);
      --text: #f0ede8;
      --text-soft: #9a958c;
      --success: #a8d4a8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "DM Sans", system-ui, sans-serif;
      background:
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(212, 175, 55, 0.08), transparent 50%),
        radial-gradient(ellipse 80% 50% at 100% 60%, rgba(212, 175, 55, 0.04), transparent 45%),
        var(--bg-deep);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(1.5rem, 5vw, 3rem);
    }

    header {
      text-align: center;
      margin-bottom: clamp(2rem, 6vw, 3.5rem);
    }

    header .brand {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2rem, 6vw, 3rem);
      font-weight: 600;
      letter-spacing: 0.06em;
      margin: 0;
      background: linear-gradient(135deg, var(--text) 0%, var(--gold) 55%, #c9a227 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    header .tagline {
      margin: 0.35rem 0 0;
      font-size: 0.95rem;
      font-weight: 400;
      color: var(--text-soft);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    section.enquiry {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(1.75rem, 4vw, 2.25rem);
      backdrop-filter: blur(12px);
      box-shadow:
        0 24px 48px rgba(0, 0, 0, 0.45),
        inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    section.enquiry h2 {
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.5rem, 4vw, 1.85rem);
      font-weight: 600;
      margin: 0 0 1.25rem;
      text-align: center;
      letter-spacing: 0.02em;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-soft);
      margin-bottom: 0.45rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input[type="tel"] {
      width: 100%;
      padding: 0.85rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text);
      background: rgba(10, 10, 12, 0.6);
      border: 1px solid rgba(212, 175, 55, 0.2);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="tel"]::placeholder {
      color: var(--text-soft);
      opacity: 0.65;
    }

    input[type="tel"]:focus {
      border-color: var(--gold-muted);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.12);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.95rem 1.25rem;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #0a0a0c;
      background: linear-gradient(165deg, var(--gold-hover), var(--gold) 45%, #b8941f);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(212, 175, 55, 0.28);
    }

    button[type="submit"]:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 28px rgba(212, 175, 55, 0.35);
    }

    button[type="submit"]:active:not(:disabled) {
      transform: translateY(0);
    }

    button[type="submit"]:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .success {
      display: none;
      text-align: center;
      padding: 1.5rem 0 0.25rem;
      font-size: 1rem;
      line-height: 1.55;
      color: var(--success);
    }

    .success.visible {
      display: block;
    }

    .error {
      display: none;
      margin-top: 0.85rem;
      font-size: 0.875rem;
      color: #e8a0a0;
      text-align: center;
    }

    .error.visible {
      display: block;
    }

    footer {
      margin-top: clamp(2rem, 5vw, 3rem);
      font-size: 0.8rem;
      color: var(--text-soft);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <header>
    <p class="brand">Balaji Classes</p>
    <p class="tagline">Tuition Centre</p>
  </header>

  <section class="enquiry" aria-labelledby="enquiry-heading">
    <h2 id="enquiry-heading">Enquire About Our Batches</h2>
    <form id="enquiry-form" novalidate>
      <label for="phone">WhatsApp number</label>
      <input
        id="phone"
        name="phone"
        type="tel"
        autocomplete="tel"
        placeholder="Enter your WhatsApp number"
        required
      />
      <button type="submit" id="submit-btn">Enquire Now</button>
      <p id="error-msg" class="error" role="alert"></p>
    </form>
    <p id="success-msg" class="success" role="status">Thank you! You will receive details on WhatsApp shortly.</p>
  </section>

  <footer>Balaji Classes</footer>

  <script>
    // Replace with your Make.com (or other) webhook URL
    const WEBHOOK_URL = "[YOUR MAKE WEBHOOK URL]";

    const form = document.getElementById("enquiry-form");
    const phoneInput = document.getElementById("phone");
    const submitBtn = document.getElementById("submit-btn");
    const successMsg = document.getElementById("success-msg");
    const errorMsg = document.getElementById("error-msg");

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      errorMsg.classList.remove("visible");
      errorMsg.textContent = "";

      const phone = phoneInput.value.trim();
      if (!phone) {
        errorMsg.textContent = "Please enter your WhatsApp number.";
        errorMsg.classList.add("visible");
        return;
      }

      if (!WEBHOOK_URL || WEBHOOK_URL.includes("[YOUR MAKE WEBHOOK URL]")) {
        errorMsg.textContent = "Set WEBHOOK_URL in the script to your Make webhook.";
        errorMsg.classList.add("visible");
        return;
      }

      submitBtn.disabled = true;

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ phone }),
        });

        if (!res.ok) {
          throw new Error("Request failed");
        }

        form.style.display = "none";
        successMsg.classList.add("visible");
      } catch (err) {
        errorMsg.textContent = "Something went wrong. Please try again or contact us directly.";
        errorMsg.classList.add("visible");
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
